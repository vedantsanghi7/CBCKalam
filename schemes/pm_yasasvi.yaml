scheme_id: PM_YASASVI
name: PM Young Achievers Scholarship Yojana for OBC / EBC / DNT
ministry: Ministry of Social Justice & Empowerment
launched: '2021-10-01'
category: scholarship
short_description: Pre- and post-matric scholarships for OBC / EBC / DNT students;
  family income ≤ ₹2.5 lakh/yr.
description: PM YASASVI provides pre- and post-matric scholarships and top-class school
  scholarships for students from OBC, EBC, and DNT communities. Family income ceiling
  ₹2.5 lakh per annum.
application_url: https://yet.nta.ac.in/
benefit:
  type: scholarship
  amount_inr: 75000
  frequency: yearly
  mode: DBT
inputs_required:
- caste_category
- annual_income_inr
- age
- has_aadhaar
- has_bank_account
rules:
- id: YSV_R001
  type: inclusion
  predicate: caste_category IN ['OBC','EWS']
  description: OBC / EBC / DNT category
  source_text: Applicable to OBC, EBC and DNT students
  confidence: high
  ambiguity_flags: []
- id: YSV_R002
  type: inclusion
  predicate: annual_income_inr <= 250000
  description: Family income ≤ ₹2.5L/year
  source_text: Family income up to ₹2.5 lakh
  confidence: high
  ambiguity_flags: []
- id: YSV_R003
  type: inclusion
  predicate: age BETWEEN 13 AND 22
  description: Student age 13–22
  source_text: Student in Class 9 to Class 12
  confidence: high
  ambiguity_flags: []
- id: YSV_R004
  type: mandatory_doc
  predicate: has_aadhaar == True AND has_bank_account == True
  description: Aadhaar + bank account
  source_text: DBT
  confidence: high
  ambiguity_flags: []
documents_checklist:
- aadhaar_card
- bank_passbook_with_ifsc
- caste_certificate
- income_certificate
- school_bonafide
