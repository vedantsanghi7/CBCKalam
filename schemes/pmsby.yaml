scheme_id: PMSBY
name: Pradhan Mantri Suraksha Bima Yojana
ministry: Department of Financial Services
launched: '2015-05-09'
category: insurance
short_description: ₹2 lakh accident cover for ages 18–70 at ₹20/year via auto-debit.
description: 'PMSBY is an annually-renewable accident insurance policy: ₹2 lakh for
  accidental death or full disability, ₹1 lakh for partial disability, at a premium
  of ₹20/year auto-debited from the bank account. Available to anyone with a savings
  account aged 18–70.'
application_url: https://jansuraksha.gov.in/
benefit:
  type: insurance
  amount_inr: 200000
  frequency: lump_sum
  mode: bank_auto_debit_premium
inputs_required:
- age
- has_bank_account
- has_aadhaar
