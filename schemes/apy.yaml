scheme_id: APY
name: Atal Pension Yojana
ministry: Department of Financial Services (PFRDA)
launched: '2015-06-01'
category: pension
short_description: Guaranteed monthly pension (₹1k–₹5k) for unorganised-sector workers
  joining before age 40.
description: APY guarantees a minimum monthly pension of ₹1,000 – ₹5,000 after age
  60, depending on contribution. Open to any Indian citizen aged 18–40 with a savings
  bank / Jan Dhan account. Income-tax payers were excluded from 1-Oct-2022 onwards.
application_url: https://npscra.nsdl.co.in/scheme-details.php
benefit:
  type: pension
  amount_inr: 5000
  frequency: monthly
  mode: post_60_pension
inputs_required:
- age
- has_bank_account
- has_aadhaar
- income_tax_filed_last_ay
rules:
