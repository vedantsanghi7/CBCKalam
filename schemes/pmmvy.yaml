scheme_id: PMMVY
name: Pradhan Mantri Matru Vandana Yojana
ministry: Ministry of Women & Child Development
launched: '2017-01-01'
category: women
short_description: ₹5,000 conditional maternity benefit for first live birth; ₹6,000
  second child if girl.
description: PMMVY provides a ₹5,000 conditional cash benefit to pregnant and lactating
  women for their first live birth, and ₹6,000 for the second child if it is a girl.
  Linked to health/nutrition milestones including institutional delivery and immunisation.
application_url: https://pmmvy.wcd.gov.in/
benefit:
  type: cash_transfer
  amount_inr: 5000
  frequency: conditional
  mode: DBT_installments
inputs_required:
- sex
- is_pregnant
- age
- has_aadhaar
- has_bank_account
rules:
- id: PMMVY_R001
  type: inclusion
  predicate: sex == 'F'
  description: Applicant must be female
  source_text: Pregnant and lactating women
  confidence: medium
  ambiguity_flags:
  - UNDEFINED_TERM
  ambiguity_notes: Gender-definition ambiguity for transgender applicants — see ambiguity
    map.
- id: PMMVY_R002
  type: inclusion
  predicate: age >= 18
  description: Adult woman (≥18)
  source_text: Eligible woman aged 18 years and above
  confidence: high
  ambiguity_flags: []
- id: PMMVY_R003
  type: inclusion
  predicate: is_pregnant == True
  description: Must be pregnant or recently delivered
  source_text: Pregnant/lactating woman with first live birth
  confidence: high
  ambiguity_flags: []
- id: PMMVY_R004
  type: mandatory_doc
  predicate: has_aadhaar == True AND has_bank_account == True
  description: Aadhaar + bank account for DBT
  source_text: DBT via Aadhaar-linked bank account
  confidence: high
  ambiguity_flags: []
documents_checklist:
- aadhaar_card
- bank_passbook_with_ifsc
- mch_card
- first_ante_natal_checkup_record
verification:
  extracted_by: sarvam-30b
  extracted_on: '2026-04-18'
  verified_by_human: true
  verifier: auto
  verification_notes: Rules authored from public scheme guidelines; re-verify against
    live sources before production use.
overlaps_with: []
prerequisites: []
sources:
