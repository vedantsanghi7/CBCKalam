scheme_id: PMJAY
name: Ayushman Bharat — PM Jan Arogya Yojana
ministry: Ministry of Health & Family Welfare
launched: '2018-09-23'
category: health
short_description: ₹5 lakh/year cashless hospital cover per family — SECC beneficiaries
  and selected occupational categories.
description: PMJAY offers ₹5,00,000 per family per year cashless hospitalisation cover
  at empanelled public and private hospitals. Eligibility is based on the SECC 2011
  deprivation list, automatic inclusion of certain occupational categories, or state-extended
  coverage.
application_url: https://pmjay.gov.in/
benefit:
  type: insurance
  amount_inr: 500000
  frequency: yearly
  mode: cashless_hospitalization
inputs_required:
- is_bpl
- caste_category
- annual_income_inr
- district_rural_or_urban
- has_aadhaar
rules:
- id: PMJAY_R001
  type: inclusion
  predicate: is_bpl == True OR caste_category IN ['SC','ST'] OR annual_income_inr
    < 250000
  description: SECC deprivation / low-income households
  source_text: Beneficiaries identified through SECC 2011 database
  confidence: medium
  ambiguity_flags:
  - STATE_DEPENDENT
  ambiguity_notes: Several states (e.g. Kerala, Delhi) extend coverage with state
    schemes.
- id: PMJAY_R002
  type: mandatory_doc
  predicate: has_aadhaar == True
  description: Aadhaar required for PMJAY e-card
  source_text: Aadhaar-based authentication for e-card generation
  confidence: high
  ambiguity_flags: []
documents_checklist:
- aadhaar_card
- ration_card
- secc_id_if_available
