scheme_id: MGNREGA
name: Mahatma Gandhi National Rural Employment Guarantee Act
ministry: Ministry of Rural Development
launched: '2006-02-02'
category: employment
short_description: 100 days of guaranteed wage employment per financial year for any
  rural adult willing to do unskilled manual work.
description: MGNREGA entitles every rural household to at least 100 days of wage employment
  in a financial year at the notified state wage. Any rural adult willing to do unskilled
  manual work can apply for a Job Card at the Gram Panchayat. No income test.
application_url: https://nrega.nic.in/
benefit:
  type: wage_employment
  notes: Up to 100 days/year at state MGNREGA wage
  mode: DBT_wage
inputs_required:
- district_rural_or_urban
- age
- has_aadhaar
rules:
- id: MGN_R001
  type: inclusion
  predicate: district_rural_or_urban == 'rural'
  description: Applicant must reside in a rural area
  source_text: The Act applies to rural areas of India.
  confidence: high
  ambiguity_flags: []
- id: MGN_R002
  type: inclusion
  predicate: age >= 18
  description: Only adults are entitled to a Job Card
  source_text: Any adult member of a rural household willing to do unskilled manual
    work
  confidence: high
  ambiguity_flags: []
- id: MGN_R003
  type: mandatory_doc
  predicate: has_aadhaar == True
  description: Aadhaar required for DBT wage payment
  source_text: Wages paid via Aadhaar-seeded NPCI account.
  confidence: high
  ambiguity_flags: []
documents_checklist:
- aadhaar_card
- bank_passbook_with_ifsc
- job_card_photo
