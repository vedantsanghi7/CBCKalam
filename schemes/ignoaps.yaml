scheme_id: IGNOAPS
name: Indira Gandhi National Old Age Pension Scheme
ministry: Ministry of Rural Development (NSAP)
launched: '2007-11-19'
category: pension
short_description: Monthly pension for BPL citizens aged 60 years and above under
  NSAP.
description: IGNOAPS provides a central pension of ₹200/month for BPL applicants aged
  60–79 years and ₹500/month for those 80 years and above. Most states top this up
  from their own funds.
application_url: https://nsap.nic.in/
benefit:
  type: pension
  amount_inr: 200
  frequency: monthly
  mode: DBT
inputs_required:
- age
- is_bpl
- has_aadhaar
- has_bank_account
rules:
- id: IGNOAPS_R001
  type: inclusion
  predicate: age >= 60
  description: Age 60 or above
  source_text: Age 60 years or above
  confidence: high
  ambiguity_flags: []
- id: IGNOAPS_R002
  type: inclusion
  predicate: is_bpl == True
  description: BPL household
  source_text: BPL identified household
  confidence: medium
  ambiguity_flags:
  - STATE_DEPENDENT
- id: IGNOAPS_R003
  type: mandatory_doc
  predicate: has_aadhaar == True AND has_bank_account == True
  description: Aadhaar + bank account
  source_text: DBT requires Aadhaar-linked account
  confidence: high
  ambiguity_flags: []
documents_checklist:
- aadhaar_card
- bank_passbook_with_ifsc
- age_proof
- bpl_certificate
