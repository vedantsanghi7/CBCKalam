scheme_id: NRLM
name: Deendayal Antyodaya Yojana — National Rural Livelihoods Mission
ministry: Ministry of Rural Development
launched: '2011-06-03'
category: women
short_description: Women's Self-Help Groups with revolving fund + community investment
  fund + bank linkage — rural poor.
description: NRLM organises rural poor women into Self-Help Groups (SHGs), federates
  them, provides a revolving fund, community investment support, and affordable bank
  credit. Priority to SC/ST, minorities, PwD, and vulnerable households.
application_url: https://aajeevika.gov.in/
benefit:
  type: shg_credit
  notes: SHG revolving fund + bank linkage
  mode: community_fund
inputs_required:
- sex
- district_rural_or_urban
- is_bpl
- has_aadhaar
- has_bank_account
rules:
- id: NRLM_R001
  type: inclusion
  predicate: sex == 'F'
  description: Applicant must be a woman
  source_text: Women from poor rural households
  confidence: high
  ambiguity_flags: []
- id: NRLM_R002
  type: inclusion
  predicate: district_rural_or_urban == 'rural'
  description: Rural residence
  source_text: NRLM is for rural areas
  confidence: high
  ambiguity_flags: []
- id: NRLM_R003
  type: inclusion
  predicate: is_bpl == True
  description: Must be from a poor household
  source_text: Participatory Identification of the Poor (PIP)
  confidence: medium
  ambiguity_flags:
  - STATE_DEPENDENT
- id: NRLM_R004
  type: mandatory_doc
  predicate: has_aadhaar == True AND has_bank_account == True
  description: Aadhaar + bank account
  source_text: Standard KYC for SHG linkage
  confidence: high
  ambiguity_flags: []
documents_checklist:
- aadhaar_card
- bank_passbook_with_ifsc
- shg_membership_proof
