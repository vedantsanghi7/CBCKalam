scheme_id: SSY
name: Sukanya Samriddhi Yojana
ministry: Department of Economic Affairs
launched: '2015-01-22'
category: savings
short_description: High-interest small-savings account for a girl child below 10 years
  — opened by parent/guardian.
description: SSY is a small-savings scheme allowing a natural or legal guardian to
  open an account for a girl child below 10 years of age. Deposits from ₹250 to ₹1.5
  lakh per FY; tenure 21 years; interest rate notified quarterly; tax benefits under
  80C + EEE regime.
application_url: https://www.nsiindia.gov.in/InternalPage.aspx?Id_Pk=89
benefit:
  type: small_savings
  notes: Up to ₹1.5L/FY; EEE tax treatment
inputs_required:
- has_daughter_under_10
- has_aadhaar
- has_bank_account
rules:
- id: SSY_R001
  type: inclusion
  predicate: has_daughter_under_10 == True
  description: Must have a daughter below 10 years
  source_text: Account opened in the name of a girl child below the age of 10
  confidence: medium
  ambiguity_flags:
  - DISCRETIONARY
  ambiguity_notes: Single-father / non-natural-guardian cases may require extra documentation.
- id: SSY_R002
  type: mandatory_doc
  predicate: has_aadhaar == True
  description: Guardian Aadhaar required
  source_text: Aadhaar-based KYC
  confidence: high
  ambiguity_flags: []
documents_checklist:
- girl_child_birth_certificate
- guardian_aadhaar
- bank_passbook_with_ifsc
