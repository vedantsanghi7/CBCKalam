scheme_id: PMJDY
name: Pradhan Mantri Jan Dhan Yojana
ministry: Department of Financial Services
launched: '2014-08-28'
category: banking
short_description: Zero-balance savings account for any Indian adult, with RuPay debit
  card and ₹2 lakh accident cover.
description: 'PMJDY is India''s flagship financial-inclusion programme: any Indian
  adult can open a zero-balance Basic Savings Bank Deposit Account (BSBDA), get a
  RuPay debit card with ₹2 lakh accident cover, a ₹10,000 overdraft, and interoperable
  access. Minors 10+ can also open subsidiary accounts.'
