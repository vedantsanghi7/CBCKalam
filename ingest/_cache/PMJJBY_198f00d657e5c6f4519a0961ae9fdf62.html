    <script lang="JavaScript" type="text/javascript">
        function changeFontSize(inc) {
            var p = document.querySelectorAll('p,li,a');
            for (n = 0; n < p.length; n++) {
                if (p[n].style.fontSize) {
                    var size = parseInt(p[n].style.fontSize.replace("px", ""));
                }
                else {
                    var size = 12;
                }
                p[n].style.fontSize = size + inc + 'px';
            }
        }
        function changeFontSizeIncrease() {
            var p = document.querySelectorAll('p,li,a,span');
            for (n = 0; n < p.length; n++) p[n].style.fontSize = '14px';

        }
        function changeFontSizeDecrease() {
            var p = document.querySelectorAll('p,li,a,span');
            for (n = 0; n < p.length; n++) {
                p[n].style.fontSize = '10px';
            }
        }
        function changeFontSizeNormal() {
            var p = document.querySelectorAll('p,li,a,span');
            for (n = 0; n < p.length; n++) {
                p[n].style.fontSize = '12px';
            }
        }

    </script>
